name: Deploy Website

on:
  push:
    branches: [main, master]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Typecheck
        working-directory: web
        run: npm run typecheck
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Copy lint (RU editorial)
        working-directory: web
        run: npm run copylint
      - name: Build static site
        working-directory: web
        env:
          # Optional override; site.ts falls back to be868e9843b46f53 (googlebe868e9843b46f53.html)
          NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          NEXT_PUBLIC_BING_SITE_VERIFICATION: ${{ secrets.BING_SITE_VERIFICATION }}
          NEXT_PUBLIC_YANDEX_VERIFICATION: ${{ secrets.YANDEX_VERIFICATION }}
        run: npm run build
      # GitHub Pages serves max-age=600 for all files; out/_headers is ignored.
      # For long cache TTL in Lighthouse, use Cloudflare Pages or Cloudflare CDN rules — docs/SiteCaching.md
      - name: Verify SEO artifacts
        working-directory: web
        run: |
          grep -q 'name="google-site-verification"' out/index.html \
            || (echo "Missing google-site-verification meta in out/index.html" && exit 1)
          test -f out/googlebe868e9843b46f53.html \
            || (echo "Missing Google verification HTML file" && exit 1)
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
