name: Deploy Website (Cloudflare Pages)

# Optional host with long-lived cache headers (_headers in web/out).
# Requires CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID repo secrets.
# See docs/SiteCaching.md

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'web/**'
      - '.github/workflows/deploy-cloudflare-pages.yml'

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ vars.CF_PAGES_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        working-directory: web
        run: npm ci
      - name: Typecheck
        working-directory: web
        run: npm run typecheck
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Copy lint (RU editorial)
        working-directory: web
        run: npm run copylint
      - name: Build static site
        working-directory: web
        env:
          NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.GOOGLE_SITE_VERIFICATION }}
          NEXT_PUBLIC_BING_SITE_VERIFICATION: ${{ secrets.BING_SITE_VERIFICATION }}
          NEXT_PUBLIC_YANDEX_VERIFICATION: ${{ secrets.YANDEX_VERIFICATION }}
        run: npm run build
      - name: Verify cache headers artifact
        working-directory: web
        run: |
          grep -q 'max-age=31536000' out/_headers \
            || (echo "Missing long-lived Cache-Control in out/_headers" && exit 1)
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/out --project-name=weekfit --branch=main
