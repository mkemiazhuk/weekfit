  <rect x="392" y="174" width="20" height="10" rx="2.5" stroke="rgba(255,255,255,0.78)" stroke-width="1.6" fill="none"/>
  <circle cx="396" cy="186" r="1.8" fill="rgba(255,255,255,0.78)"/>
