  <path d="M88 402l5-7 5 7 5-7" stroke="rgba(255,255,255,0.72)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="98" y="442" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" text-anchor="middle">385FT</text>

