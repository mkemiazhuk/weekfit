  <text x="250" y="34" fill="rgba(255,255,255,0.34)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="13" font-weight="700" text-anchor="middle">N</text>
  <text x="468" y="283" fill="rgba(255,255,255,0.22)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="11" font-weight="700" text-anchor="middle">E</text>
