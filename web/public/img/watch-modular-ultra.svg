  <circle cx="398" cy="392" r="52" stroke="rgba(46,219,250,0.1)" stroke-width="0.8"/>
  <path d="M372 374c10-12 22-12 26 0s18 12 26 0" stroke="rgba(46,219,250,0.55)" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <text x="398" y="404" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="44" font-weight="700" text-anchor="middle">1.8</text>
  <text x="398" y="466" fill="rgba(255,255,255,0.62)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="12" font-weight="600" letter-spacing="0.06em" text-anchor="middle">FT &#8593;</text>
</svg>
