  <!-- Inner waypoint ring -->
  <circle cx="250" cy="279" r="198" stroke="rgba(255,255,255,0.05)" stroke-width="0.7"/>
  <circle cx="250" cy="96" r="3.5" fill="rgba(255,255,255,0.38)"/>
  <circle cx="356" cy="136" r="3" fill="rgba(255,255,255,0.28)"/>
